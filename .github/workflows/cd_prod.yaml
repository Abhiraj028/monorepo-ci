name: Deploy to production

on: 
  push:
    branches:
      - "production"

jobs:
  deploy:
    name: Deploy eveyrthing to production cluster
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
          chmod 600 ~/ssh_key
          ssh -i ~/ssh_key -o StrictHostKeyChecking=no ubuntu@98.90.208.98 << 'EOF'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd monorepo-ci
            npm install -g pnpm
            git pull origin production
            pnpm install
            pnpm run build
            pm2 restart all
          EOF
